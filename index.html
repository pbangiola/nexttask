<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Sorter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            max-width: 800px;
            position: relative;
        }
        .hidden {
            display: none;
        }
        button {
            margin: 5px;
            padding: 8px 12px;
            cursor: pointer;
        }
        input, textarea {
            margin: 5px 0;
            padding: 6px;
        }
        .checkbox-container, .upload-container {
            margin: 15px 0;
            padding: 10px;
            border-radius: 4px;
        }
        .upload-container {
            border: 1px dashed #ccc;
            background: #fafafa;
        }
        /* Side-by-side layout for explicit index inserting */
        .insertion-layout {
            display: flex;
            gap: 40px;
            margin-top: 15px;
        }
        .insertion-column {
            flex: 1;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
        }
        /* Top right positioning for Stop Working */
        #stopWorkingBtn {
            position: absolute;
            top: 0;
            right: 0;
            background-color: #ffcdd2;
            border: 1px solid #e53935;
            color: #b71c1c;
            font-weight: bold;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <button id="stopWorkingBtn" class="hidden">Stop Working</button>

    <h1>Task Sorter</h1>
    
    <div id="taskInput">
        <h2>Enter Your Tasks</h2>
        <textarea id="tasks" rows="10" cols="40" placeholder="Enter one task per line"></textarea>
        
        <div class="checkbox-container">
            <label>
                <input type="checkbox" id="skipSortCheckbox"> Skip sorting (use current order)
            </label>
        </div>
        <button id="startSort">Start Sorting</button>

        <div class="upload-container">
            <h3>Or Resume Previous Session</h3>
            <input type="file" id="csvUpload" accept=".csv">
        </div>
    </div>

    <div id="taskCompare" class="hidden">
        <h2>Which task comes first?</h2>
        <button id="task1"></button>
        <button id="task2"></button>
    </div>

    <div id="dynamicContainer"></div>

    <script src="script.js"></script>
</body>
</html>
